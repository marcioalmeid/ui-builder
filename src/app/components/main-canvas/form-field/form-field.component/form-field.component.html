<div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 hover:border-black cursor-pointer">

    <div class="flex items-center justify-between mb-1">
        <span class="text-sm">{{field().type | titlecase }}</span>
        <button mat-icon-button color="warn" class="float-right" (click)="onDeleteClick($event)">
            <mat-icon>delete</mat-icon>
        </button>
    </div>
    <app-field-preview [field]="field()" ></app-field-preview>
</div>
